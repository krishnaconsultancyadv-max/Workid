version: '3.8'

services:
  db:
    image: postgres:15
    container_name: workid_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-workid}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-workid}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: workid_backend
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASS: ${POSTGRES_PASSWORD:-password}
      DB_NAME: ${POSTGRES_DB:-workid}
      JWT_SECRET: ${JWT_SECRET:-super_secret_change_me}
      JWT_EXPIRY: ${JWT_EXPIRY:-1d}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata: